<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financio - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Krona+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <header class="top-nav">
            <div class="logo">FINANCIO</div>
            <nav>
                <a href="#">MAIN MENU</a>
                <a href="#">HOME</a>
                <a href="#">LOGIN</a>
                <a href="#">CONTACT US</a>
            </nav>
        </header>

        <main class="form-section">
            <h2>NEW USER SIGN UP</h2>
            <div class="main">
            <form id="signupForm">
                <input type="text" id="fullName" placeholder="Enter Full Name" required>
                <input type="email" id="email" placeholder="Enter Email Address" required>
                <input type="tel" id="phoneNo" placeholder="Enter Phone Number" required>
                <input type="password" id="password" placeholder="Enter Password" required>
                
                <button type="submit">SIGNUP</button>
            </form>
            </div>
        </main>
    </div>



    <script>
        const signupForm = document.getElementById('signupForm');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const full_name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone_no = document.getElementById('phoneNo').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:8000/api/v1/users/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ full_name, email, phone_no, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Signup successful! Please proceed to login.');
                    
                   
                    window.location.href = '../login/index.html'; 
                    
                } else {
                    alert(`Signup Failed: ${data.message}`);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Could not connect to the server. Is your backend running on port 8000?');
            }
        });
    </script>


</body>
</html>
